name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: python -m pip install --upgrade pip ruff

      - name: Run ruff
        run: |
          mkdir -p reports
          ruff check . --output-format=github
          ruff check . > reports/ruff.txt

      - name: Write summary
        if: always()
        run: |
          echo "## Lint report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tool: ruff" >> $GITHUB_STEP_SUMMARY
          echo "- Result: see workflow logs and artifact \`lint-reports\`" >> $GITHUB_STEP_SUMMARY

      - name: Upload lint artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-reports
          path: reports/
          retention-days: 14

  sast:
    name: SAST (CodeQL)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      - name: Write summary
        if: always()
        run: |
          echo "## SAST report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Tool: CodeQL" >> $GITHUB_STEP_SUMMARY
          echo "- Result: findings are published to GitHub code scanning" >> $GITHUB_STEP_SUMMARY
          echo "- Open: Security -> Code scanning" >> $GITHUB_STEP_SUMMARY

